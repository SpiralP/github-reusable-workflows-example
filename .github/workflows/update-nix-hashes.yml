name: Update nix hashes

on:
  pull_request:
    branches: [ master, main ]

concurrency:
  group: update-nix-hashes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # to push branch

jobs:
  update_nix_hashes:
    # !!! disabled
    if: ${{ false }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/update-nix-hashes.yml@da5df5361d9d466cfecebc9b9abcb05f41ecf2e7 # main
    with:
      npm-attribute: node
