name: Update nix hashes

on:
  pull_request:
    branches: [ master, main ]

concurrency:
  group: update-nix-hashes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # to push branch

jobs:
  update_nix_hashes:
    # !!! disabled
    if: ${{ false }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/update-nix-hashes.yml@7e0f2e3759bc2b0576a8921dfa33fb449d5e8a1b # main
    with:
      npm-attribute: node
