name: Update nix hashes

on:
  pull_request:
    branches: [ master, main ]

concurrency:
  group: update-nix-hashes-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # to push branch

jobs:
  update_nix_hashes:
    # !!! disabled
    if: ${{ false }}
    uses: SpiralP/github-reusable-workflows/.github/workflows/update-nix-hashes.yml@61301a0998c3a5142d23800416f14cb9d7f13c91 # main
    with:
      npm-attribute: node
