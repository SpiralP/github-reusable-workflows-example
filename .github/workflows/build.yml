name: build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux-nix:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@dd7556a6905c9e8fa54f9907194f55f887f5db0d # main

  many-machines:
    uses: ./.github/workflows/many-machines.yml
