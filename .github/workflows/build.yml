name: build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux-nix:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@3d882e341fd1e63286034acac91ec5ee740a36cf # main

  many-machines:
    uses: ./.github/workflows/many-machines.yml
