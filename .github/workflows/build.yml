name: build

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches-ignore: [ main, master ]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # for checkout

jobs:
  linux-nix:
    uses: SpiralP/github-reusable-workflows/.github/workflows/build.yml@d83af96d782c8fd99177bb0116964e7ec7fdbce8 # main

  many-machines:
    uses: ./.github/workflows/many-machines.yml
